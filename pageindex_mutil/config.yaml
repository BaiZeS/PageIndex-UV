# ---------------------------------------------------------------------------
# LLM endpoint defaults (resolved centrally in pageindex_mutil/utils.py via
# _resolve_llm_config / configure_llm):
#   * OPENAI_API_KEY      -> standard OpenAI endpoint (https://api.openai.com/v1)
#   * DASHSCOPE_API_KEY   -> DashScope compatible-mode endpoint
#                            (https://dashscope.aliyuncs.com/compatible-mode/v1)
#   * OPENAI_BASE_URL     -> overrides either of the above when set
# When using the standard OpenAI endpoint, set `model` and `retrieve_model`
# below to an OpenAI model (e.g. gpt-4o-mini). The defaults below (`qwen-plus`)
# target the DashScope/Qwen endpoint.
#
# Model-name overrides (resolved in ConfigLoader.load):
#   * MODEL_NAME            env var overrides `model` below
#   * RETRIEVE_MODEL_NAME   env var overrides `retrieve_model` below
#   Precedence (highest wins):
#     1. caller-explicit kwarg to ConfigLoader().load({...})
#     2. MODEL_NAME / RETRIEVE_MODEL_NAME env vars
#     3. the `model` / `retrieve_model` values in THIS file
#   This is the ONE resolution path shared by both the CLI (main.py) and the
#   server path (PageIndexClient -> ConfigLoader), so the same MODEL_NAME env
#   now takes effect in ALL paths.
# ---------------------------------------------------------------------------
model: "qwen-plus"
retrieve_model: "qwen-plus"
toc_check_page_num: 20
max_page_num_each_node: 10
max_token_num_each_node: 20000
if_add_node_id: "yes"
if_add_node_summary: "yes"
if_add_doc_description: "no"
if_add_node_text: "no"
